  <text x="396" y="434" font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#475569">· 通用 + 专项测评用例</text>
  <text x="396" y="452" font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#475569">· 自动评分框架</text>
  <text x="396" y="460" font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="10" fill="#f43f5e"> </text>
  <!-- T5 week -->
  <text x="786" y="416" text-anchor="end"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" fill="#94a3b8">← 第 6–8 周</text>

  <!-- Fan-in T4+T5 → 集成验收 -->
  <line x1="198" y1="476" x2="198" y2="492" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="547" y1="466" x2="547" y2="492" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="198" y1="492" x2="547" y2="492" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="372" y1="492" x2="372" y2="500" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#td-arr)"/>

  <!-- ── 集成验收  x=172-572 y=502-542 ── -->
  <rect x="172" y="502" width="400" height="40" rx="8" fill="#1e293b" filter="url(#td-shadow)"/>
  <text x="372" y="527" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="13" font-weight="700" fill="#f8fafc">集成验收</text>
  <!-- Week label -->
  <text x="786" y="525" text-anchor="end"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" fill="#94a3b8">← 第 11–12 周</text>
</svg>
