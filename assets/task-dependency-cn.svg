  <rect x="380" y="366" width="336" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#td-shadow)"/>
  <line x1="385" y1="375" x2="385" y2="457" stroke="#f43f5e" stroke-width="5" stroke-linecap="round"/>
