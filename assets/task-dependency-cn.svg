  <text x="46" y="434" font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#475569">· 开发（Genesis 数字员工自举）</text>
  <text x="46" y="452" font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#475569">· Mentor 全程监督</text>
  <text x="46" y="470" font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="10" fill="#8b5cf6">← 第 6–10 周</text>

