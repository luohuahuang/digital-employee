  <text x="216" y="94" font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#475569">数字员工标准定义（概念、Schema、五大特征）</text>

  <!-- Branch T0 → T1 + T2 -->
  <line x1="400" y1="106" x2="400" y2="124" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="218" y1="124" x2="587" y2="124" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="218" y1="124" x2="218" y2="132" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="587" y1="124" x2="587" y2="132" stroke="#94a3b8" stroke-width="1.5"/>

