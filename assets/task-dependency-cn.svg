        font-size="15" font-weight="700" fill="#0f172a">第一阶段任务依赖关系</text>

  <!-- ── T0  x=200-600 y=48-106 ── -->
  <rect x="200" y="48" width="400" height="58" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#td-shadow)"/>
  <line x1="205" y1="57" x2="205" y2="97" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
  <rect x="216" y="60" width="30" height="19" rx="9" fill="#fef3c7"/>
  <text x="231" y="73" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
