  <rect x="30" y="132" width="376" height="122" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#td-shadow)"/>
  <line x1="35" y1="141" x2="35" y2="245" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <rect x="46" y="144" width="30" height="19" rx="9" fill="#dbeafe"/>
  <text x="61" y="157" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
