<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 596" role="img" aria-labelledby="roadmap-cn-title">
  <title id="roadmap-cn-title">数字员工建设四步路线图与时间规划</title>
  <defs>
    <linearGradient id="rmbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="rmshadow" x="-4%" y="-4%" width="108%" height="114%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <marker id="rmarr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="rmarr-d" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#cbd5e1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="596" fill="url(#rmbg)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', 'Noto Sans CJK SC', sans-serif"
        font-size="16" font-weight="700" fill="#0f172a">数字员工建设路线图</text>

  <!-- ══ PHASE 1 BAR  y=55–293  h=238 ══ -->
  <rect x="22" y="55" width="46" height="238" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text transform="translate(45,174) rotate(-90)" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" font-weight="700" fill="#1d4ed8">第 1–3 月</text>

  <!-- ── Step 1  y=55  h=100 ── -->
  <rect x="82" y="55" width="698" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#rmshadow)"/>
  <line x1="87" y1="64" x2="87" y2="146" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <!-- badge -->
  <rect x="96" y="67" width="52" height="20" rx="10" fill="#dbeafe"/>
  <text x="122" y="81" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" font-weight="700" fill="#1d4ed8">第一步</text>
  <!-- title -->
  <text x="158" y="81"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="13" font-weight="700" fill="#0f172a">基础设施准备</text>
  <text x="282" y="81"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#64748b">（培育数字员工的土壤）</text>
  <!-- content -->
  <text x="97" y="106"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#475569">· 定义概念边界和技术方案，搭建基础设施</text>
  <text x="97" y="124"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#475569">· 创建第一批 Genesis 数字员工</text>

  <!-- arrow 1→2 -->
  <line x1="431" y1="157" x2="431" y2="173" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#rmarr)"/>

  <!-- ── Step 2  y=175  h=118 ── -->
  <rect x="82" y="175" width="698" height="118" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#rmshadow)"/>
  <line x1="87" y1="184" x2="87" y2="284" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <!-- badge -->
  <rect x="96" y="187" width="52" height="20" rx="10" fill="#dbeafe"/>
  <text x="122" y="201" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" font-weight="700" fill="#1d4ed8">第二步</text>
  <!-- title -->
  <text x="158" y="201"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="13" font-weight="700" fill="#0f172a">第一代数字员工加工与训练</text>
  <text x="350" y="201"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#64748b">（试点）</text>
  <!-- content -->
  <text x="97" y="226"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#475569">· 用 Genesis 数字员工建设数字员工工厂</text>
  <text x="97" y="244"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#475569">· 生产并训练第一代能在各角色胜任工作、通过正式验收的数字员工</text>
  <!-- separator + outcome -->
  <line x1="97" y1="256" x2="769" y2="256" stroke="#eff6ff" stroke-width="1"/>
  <text x="97" y="274"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="10" fill="#3b82f6">✓ 产出：基础设施就绪 + 第一代数字员工可用、可迭代</text>

  <!-- dashed arrow 2→3 -->
  <line x1="431" y1="295" x2="431" y2="313" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#rmarr-d)"/>

  <!-- ══ PHASE 2 BAR  y=315–433  h=118 ══ -->
  <rect x="22" y="315" width="46" height="118" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text transform="translate(45,374) rotate(-90)" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" font-weight="700" fill="#065f46">第 4–6 月</text>

  <!-- ── Step 3  y=315  h=118 ── -->
  <rect x="82" y="315" width="698" height="118" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#rmshadow)"/>
  <line x1="87" y1="324" x2="87" y2="424" stroke="#10b981" stroke-width="5" stroke-linecap="round"/>
  <!-- badge -->
  <rect x="96" y="327" width="52" height="20" rx="10" fill="#d1fae5"/>
  <text x="122" y="341" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" font-weight="700" fill="#065f46">第三步</text>
  <!-- title -->
  <text x="158" y="341"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="13" font-weight="700" fill="#0f172a">正式入职，通过生产验收</text>
  <text x="322" y="341"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#64748b">（经过实战检验）</text>
  <!-- content -->
  <text x="97" y="366"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#475569">· 建立技能训练体系、安全标准、绩效评估体系</text>
  <text x="97" y="384"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#475569">· 找到合适场景进入生产环境（如大促备战辅助、发布窗口协作等）</text>
  <!-- separator + outcome -->
  <line x1="97" y1="396" x2="769" y2="396" stroke="#ecfdf5" stroke-width="1"/>
  <text x="97" y="414"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="10" fill="#10b981">✓ 产出：数字员工进入生产，真正产生影响，积累数据</text>

  <!-- dashed arrow 3→4 -->
  <line x1="431" y1="435" x2="431" y2="453" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#rmarr-d)"/>

  <!-- ══ PHASE 3 BAR  y=455–565  h=110 ══ -->
  <rect x="22" y="455" width="46" height="110" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text transform="translate(45,510) rotate(-90)" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" font-weight="700" fill="#5b21b6">第 7–12 月</text>

  <!-- ── Step 4  y=455  h=110 ── -->
  <rect x="82" y="455" width="698" height="110" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#rmshadow)"/>
  <line x1="87" y1="464" x2="87" y2="556" stroke="#8b5cf6" stroke-width="5" stroke-linecap="round"/>
  <!-- badge -->
  <rect x="96" y="467" width="52" height="20" rx="10" fill="#ede9fe"/>
  <text x="122" y="481" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" font-weight="700" fill="#5b21b6">第四步</text>
  <!-- title -->
  <text x="158" y="481"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="13" font-weight="700" fill="#0f172a">建设第二代数字员工</text>
  <text x="301" y="481"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#64748b">（进化）</text>
  <!-- content -->
  <text x="97" y="506"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#475569">· 基于第一代在生产中积累的数据和经验</text>
  <text x="97" y="524"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#475569">· 迭代第二代数字员工</text>
  <!-- separator + outcome -->
  <line x1="97" y1="536" x2="769" y2="536" stroke="#f5f3ff" stroke-width="1"/>
  <text x="97" y="553"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="10" fill="#8b5cf6">✓ 产出：基于生产数据迭代第二代，达到高成熟度</text>

  <!-- Footer note -->
  <text x="400" y="582" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="10" fill="#94a3b8">以下第一阶段方案聚焦前 3 个月（对应路线图第一步 + 第二步）</text>
</svg>
