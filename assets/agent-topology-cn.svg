<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 308" role="img" aria-labelledby="topo-cn-title">
  <title id="topo-cn-title">多 Agent 编排拓扑（参考模型）</title>
  <defs>
    <linearGradient id="at-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="at-shadow" x="-5%" y="-5%" width="110%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <marker id="at-arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="800" height="308" fill="url(#at-bg)"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="15" font-weight="700" fill="#0f172a">多 Agent 编排拓扑（参考模型）</text>

  <!-- 人类 box -->
  <rect x="240" y="50" width="320" height="46" rx="8" fill="#1e293b" filter="url(#at-shadow)"/>
  <text x="400" y="78" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="13" font-weight="700" fill="#f8fafc">人类（Supervisor + Mentor）</text>

  <!-- Arrow -->
  <line x1="400" y1="96" x2="400" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#at-arr)"/>
  <text x="408" y="112" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" fill="#94a3b8">审批 / 干预</text>

  <!-- PM/Coordinator box -->
  <rect x="100" y="122" width="600" height="78" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#at-shadow)"/>
  <line x1="105" y1="131" x2="105" y2="191" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <rect x="116" y="134" width="80" height="19" rx="9" fill="#dbeafe"/>
  <text x="156" y="147" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="9.5" font-weight="700" fill="#1d4ed8">编排枢纽 · 可选</text>
  <text x="206" y="148" font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="13" font-weight="700" fill="#0f172a">PM/Coordinator 数字员工</text>
  <text x="400" y="174" text-anchor="middle" font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="11" fill="#64748b">全局上下文 / 任务分解 / 跨角色对齐</text>

  <!-- Fan-out connector -->
  <line x1="400" y1="200" x2="400" y2="216" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="188" y1="216" x2="612" y2="216" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="188" y1="216" x2="188" y2="226" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="294" y1="216" x2="294" y2="226" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="400" y1="216" x2="400" y2="226" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="506" y1="216" x2="506" y2="226" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="612" y1="216" x2="612" y2="226" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Role boxes (y=226 h=52 w=90) -->
  <!-- BE cx=188 -->
  <rect x="143" y="226" width="90" height="52" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#at-shadow)"/>
  <line x1="148" y1="234" x2="148" y2="270" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <text x="188" y="257" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="700" fill="#0f172a">BE</text>
  <!-- FE cx=294 -->
  <rect x="249" y="226" width="90" height="52" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#at-shadow)"/>
  <line x1="254" y1="234" x2="254" y2="270" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <text x="294" y="257" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="700" fill="#0f172a">FE</text>
  <!-- TPM cx=400 -->
  <rect x="355" y="226" width="90" height="52" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#at-shadow)"/>
  <line x1="360" y1="234" x2="360" y2="270" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <text x="400" y="257" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="700" fill="#0f172a">TPM</text>
  <!-- QA cx=506 -->
  <rect x="461" y="226" width="90" height="52" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#at-shadow)"/>
  <line x1="466" y1="234" x2="466" y2="270" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <text x="506" y="257" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="700" fill="#0f172a">QA</text>
  <!-- SRE cx=612 -->
  <rect x="567" y="226" width="90" height="52" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#at-shadow)"/>
  <line x1="572" y1="234" x2="572" y2="270" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <text x="612" y="257" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="700" fill="#0f172a">SRE</text>

  <!-- Annotation -->
  <text x="400" y="294" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, 'PingFang SC', sans-serif"
        font-size="10" fill="#94a3b8">（角色化数字员工）</text>
</svg>
