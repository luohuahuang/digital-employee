<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 596" role="img" aria-labelledby="roadmap-en-title">
  <title id="roadmap-en-title">Digital Employee Build Roadmap — Four Steps &amp; Timeline</title>
  <defs>
    <linearGradient id="enbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="enshadow" x="-4%" y="-4%" width="108%" height="114%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <marker id="enarr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="enarr-d" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#cbd5e1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="596" fill="url(#enbg)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="700" fill="#0f172a">Digital Employee Build Roadmap</text>

  <!-- ══ PHASE 1 BAR  y=55–293  h=238 ══ -->
  <rect x="22" y="55" width="46" height="238" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text transform="translate(45,174) rotate(-90)" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" font-weight="700" fill="#1d4ed8">Month 1–3</text>

  <!-- ── Step 1  y=55  h=100 ── -->
  <rect x="82" y="55" width="698" height="100" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#enshadow)"/>
  <line x1="87" y1="64" x2="87" y2="146" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <!-- badge -->
  <rect x="96" y="67" width="52" height="20" rx="10" fill="#dbeafe"/>
  <text x="122" y="81" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" font-weight="700" fill="#1d4ed8">Step 1</text>
  <!-- title -->
  <text x="158" y="81"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="700" fill="#0f172a">Infrastructure Setup</text>
  <text x="305" y="81"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#64748b">(cultivating the ground for digital employees)</text>
  <!-- content -->
  <text x="97" y="106"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#475569">· Define concept boundaries and technical architecture; build infrastructure</text>
  <text x="97" y="124"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#475569">· Create the first batch of Genesis digital employees</text>

  <!-- arrow 1→2 -->
  <line x1="431" y1="157" x2="431" y2="173" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#enarr)"/>

  <!-- ── Step 2  y=175  h=118 ── -->
  <rect x="82" y="175" width="698" height="118" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#enshadow)"/>
  <line x1="87" y1="184" x2="87" y2="284" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <!-- badge -->
  <rect x="96" y="187" width="52" height="20" rx="10" fill="#dbeafe"/>
  <text x="122" y="201" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" font-weight="700" fill="#1d4ed8">Step 2</text>
  <!-- title -->
  <text x="158" y="201"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="700" fill="#0f172a">1st-Gen Training &amp; Development</text>
  <text x="376" y="201"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#64748b">(Pilot)</text>
  <!-- content -->
  <text x="97" y="226"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#475569">· Use Genesis digital employees to build the digital employee factory</text>
  <text x="97" y="244"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#475569">· Produce and train 1st-gen employees qualified by role, passing formal acceptance</text>
  <!-- separator + outcome -->
  <line x1="97" y1="256" x2="769" y2="256" stroke="#eff6ff" stroke-width="1"/>
  <text x="97" y="274"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" fill="#3b82f6">✓ Output: infrastructure ready + 1st-gen digital employees usable and iterable</text>

  <!-- dashed arrow 2→3 -->
  <line x1="431" y1="295" x2="431" y2="313" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#enarr-d)"/>

  <!-- ══ PHASE 2 BAR  y=315–433  h=118 ══ -->
  <rect x="22" y="315" width="46" height="118" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text transform="translate(45,374) rotate(-90)" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" font-weight="700" fill="#065f46">Month 4–6</text>

  <!-- ── Step 3  y=315  h=118 ── -->
  <rect x="82" y="315" width="698" height="118" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#enshadow)"/>
  <line x1="87" y1="324" x2="87" y2="424" stroke="#10b981" stroke-width="5" stroke-linecap="round"/>
  <!-- badge -->
  <rect x="96" y="327" width="52" height="20" rx="10" fill="#d1fae5"/>
  <text x="122" y="341" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" font-weight="700" fill="#065f46">Step 3</text>
  <!-- title -->
  <text x="158" y="341"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="700" fill="#0f172a">Onboarding into Production</text>
  <text x="341" y="341"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#64748b">(battle-tested)</text>
  <!-- content -->
  <text x="97" y="366"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#475569">· Establish skill training, safety standards, and performance evaluation systems</text>
  <text x="97" y="384"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#475569">· Deploy to suitable production scenarios (e.g. campaign support, release-window coordination)</text>
  <!-- separator + outcome -->
  <line x1="97" y1="396" x2="769" y2="396" stroke="#ecfdf5" stroke-width="1"/>
  <text x="97" y="414"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" fill="#10b981">✓ Output: digital employees in production, generating real impact, accumulating data</text>

  <!-- dashed arrow 3→4 -->
  <line x1="431" y1="435" x2="431" y2="453" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#enarr-d)"/>

  <!-- ══ PHASE 3 BAR  y=455–565  h=110 ══ -->
  <rect x="22" y="455" width="46" height="110" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text transform="translate(45,510) rotate(-90)" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" font-weight="700" fill="#5b21b6">Month 7–12</text>

  <!-- ── Step 4  y=455  h=110 ── -->
  <rect x="82" y="455" width="698" height="110" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#enshadow)"/>
  <line x1="87" y1="464" x2="87" y2="556" stroke="#8b5cf6" stroke-width="5" stroke-linecap="round"/>
  <!-- badge -->
  <rect x="96" y="467" width="52" height="20" rx="10" fill="#ede9fe"/>
  <text x="122" y="481" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" font-weight="700" fill="#5b21b6">Step 4</text>
  <!-- title -->
  <text x="158" y="481"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="700" fill="#0f172a">Build 2nd-Gen Digital Employees</text>
  <text x="378" y="481"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#64748b">(Evolution)</text>
  <!-- content -->
  <text x="97" y="506"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#475569">· Based on data and experience accumulated by the 1st-gen in production</text>
  <text x="97" y="524"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#475569">· Iterate the 2nd generation of digital employees</text>
  <!-- separator + outcome -->
  <line x1="97" y1="536" x2="769" y2="536" stroke="#f5f3ff" stroke-width="1"/>
  <text x="97" y="553"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" fill="#8b5cf6">✓ Output: iterate 2nd-gen from production data, reaching high maturity</text>

  <!-- Footer note -->
  <text x="400" y="582" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" fill="#94a3b8">Phase One plan focuses on the first 3 months (Steps 1 + 2 of the roadmap)</text>
</svg>
