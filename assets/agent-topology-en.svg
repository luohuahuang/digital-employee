<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 308" role="img" aria-labelledby="topo-en-title">
  <title id="topo-en-title">Multi-Agent Orchestration Topology (Reference Model)</title>
  <defs>
    <linearGradient id="ate-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="ate-shadow" x="-5%" y="-5%" width="110%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <marker id="ate-arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="800" height="308" fill="url(#ate-bg)"/>

  <text x="400" y="32" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="700" fill="#0f172a">Multi-Agent Orchestration Topology (Reference Model)</text>

  <!-- Human box -->
  <rect x="230" y="50" width="340" height="46" rx="8" fill="#1e293b" filter="url(#ate-shadow)"/>
  <text x="400" y="78" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="700" fill="#f8fafc">Human (Supervisor + Mentor)</text>

  <!-- Arrow -->
  <line x1="400" y1="96" x2="400" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ate-arr)"/>
  <text x="408" y="112" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" fill="#94a3b8">Approval / Intervention</text>

  <!-- PM/Coordinator box -->
  <rect x="80" y="122" width="640" height="78" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#ate-shadow)"/>
  <line x1="85" y1="131" x2="85" y2="191" stroke="#3b82f6" stroke-width="5" stroke-linecap="round"/>
  <rect x="96" y="134" width="104" height="19" rx="9" fill="#dbeafe"/>
  <text x="148" y="147" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="9.5" font-weight="700" fill="#1d4ed8">Orchestration Hub · Optional</text>
  <text x="210" y="148" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="700" fill="#0f172a">PM/Coordinator Digital Employee</text>
  <text x="400" y="174" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#64748b">Global context / Task decomposition / Cross-role alignment</text>

  <!-- Fan-out connector -->
  <line x1="400" y1="200" x2="400" y2="216" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="188" y1="216" x2="612" y2="216" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="188" y1="216" x2="188" y2="226" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="294" y1="216" x2="294" y2="226" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="400" y1="216" x2="400" y2="226" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="506" y1="216" x2="506" y2="226" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="612" y1="216" x2="612" y2="226" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Role boxes -->
  <rect x="143" y="226" width="90" height="52" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#ate-shadow)"/>
  <line x1="148" y1="234" x2="148" y2="270" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <text x="188" y="257" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="700" fill="#0f172a">BE</text>

  <rect x="249" y="226" width="90" height="52" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#ate-shadow)"/>
  <line x1="254" y1="234" x2="254" y2="270" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <text x="294" y="257" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="700" fill="#0f172a">FE</text>

  <rect x="355" y="226" width="90" height="52" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#ate-shadow)"/>
  <line x1="360" y1="234" x2="360" y2="270" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <text x="400" y="257" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="700" fill="#0f172a">TPM</text>

  <rect x="461" y="226" width="90" height="52" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#ate-shadow)"/>
  <line x1="466" y1="234" x2="466" y2="270" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <text x="506" y="257" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="700" fill="#0f172a">QA</text>

  <rect x="567" y="226" width="90" height="52" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" filter="url(#ate-shadow)"/>
  <line x1="572" y1="234" x2="572" y2="270" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <text x="612" y="257" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="700" fill="#0f172a">SRE</text>

  <text x="400" y="294" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="10" fill="#94a3b8">(Role-based digital employees)</text>
</svg>
